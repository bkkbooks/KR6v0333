body:
  text: 彌勒菩薩造民國苾芻法尊譯頂禮曼殊室利菩薩由知何所斷有餘所應證欲辨彼等相故我造此論此等一切二類所攝謂法與法性法表生死法性表三乘涅槃如所顯現二及名言虛妄分別是為法相無而現者是為虛妄分別者謂於一切無義唯計度耳無能取所取能詮所詮差別之真如是為法相無而顯現故錯亂是雜染之因如見幻象等不見有亦爾無與現中隨缺一種則錯亂不錯亂雜染清淨皆不隨轉二者非一非異以有無有別及無別故由六種相通達法為無上謂相成立非一異所依共不共悟入顯現能取所取而無實事相及成立非一異者如略標説諸於何流轉彼為所依謂有情及器世間器世間如共所了有情世間有共不共胎生名言攝受治罰功德過失互為因故更互增上故名為共頌本有損益二事依了業樂苦死生縛脫由不共故名為不共共現似外所取者即能取識離識無別義以共故不共他心等識為所取者其等引非等引識亦互非等境以於非等引前現自分別故於等引三摩地行境中亦現彼影像故若現似所取非有則現似能取亦成立非有故善成立能取所取現而非有無始等起善成立故二取非有亦善成立由六種相通達法性是為無上謂相依處決擇觸證隨念悟達彼自性相如略標説依處謂一切法與契經等十二分教一切句身決擇謂依大乘經如理作意所攝一切加行道觸證謂為正見故以見道現量加行親證領受真如隨念謂如觸證為除彼垢之菩提分所攝一切修道悟達彼自性謂無垢真如於一切種唯真如現此即轉依圓成實由十種相通達轉依是為無上謂通達自性物補特伽羅差別所為所依作意加行過患勝利通達自性謂無垢真如不現客塵唯現真如通達物謂共器識真如轉依契經法界真如轉依不共有情界識真如轉依通達補特伽羅初二真如轉依是佛菩薩者後亦是聲聞獨覺者通達差別謂諸佛菩薩有嚴淨佛土差別法身受用身差別獲得化身差別以得普見教授自在有差別故通達所為謂宿願差別説大乘法所緣差別於十地中加行差別故通達所依謂由六相通達無分別智故由六相通達者謂由所緣故由離相故由正加行故由相故由勝利故由遍知故由四相通達所緣謂説大乘法於彼勝解決定圓滿資糧故由四相通達離相謂由離所治品能治品真如智法相故如其次第此即顯示永離粗中細長隨轉相通達正加行亦有四相謂由有得加行由無得加行由有得無得加行由無得有得加行通達性相亦有三相謂住法性故由善安住無二取離言説之法性故無顯現故以二取言説根境識器世間不顯現故此顯彼相如經所説無色無觀無示無對無住無現無了無依是無分別智顯現故由見一切法如虛空故見一切行如幻等故通達勝利有四相謂得圓滿法身故得無上樂住故得見説自在故通達遍知亦有四相謂對治遍知故自相遍知故差別遍知故業遍知故其對治遍知謂無分別智是五種無執之對治謂執著法人變壞異損減自相遍知謂不作意超尋伺寂靜自性義取相離彼五事是此自相差別遍知謂由無分別非一分性無住性畢竟性無上五相差別故業遍知謂遠離諸分別給無上安樂令離煩惱所知二障其後得智悟入一切所知相嚴淨佛土成熟有情給一切相智五種業差別通達作意者如云菩薩欲證無分別智當如是作意由無始時來不知真如虛妄分別一切種子是現似不實二取之因於彼能依亦異其因及果雖現似有而非真實由如是現法性不現由彼不現法性則現菩薩如是如理作意便能通達無分別智由如是緣便達緣唯識由緣唯識便能通達一切義無得由一切義無得便能通達唯識亦無所得由彼無得便能通達緣二無別其二俱無得即無分別智此無境無得是一切相無得所顯故加行通達有四種相謂勝解行地由勝解加行故是決擇位於初地中由各別內證加行故是觸證位未淨六地中由善修習加行故清淨三地中亦爾是隨念位於佛地中由究竟加行故佛事任運無間故是到達自性位通達過患謂若無轉依有四種過謂無不起煩惱所依之過無發起道所依之過無般涅槃補特伽羅安立名言所依之過無安立二種菩提差別名言所依之過與彼相違有轉依應知即是四種勝利當知彼等實相如實通達轉依無法顯現如夢幻等轉依之喻如虛空金水等
